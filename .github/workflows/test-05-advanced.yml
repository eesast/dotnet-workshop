name: test-05-advanced
on:
  pull_request:
    branches: [homework/05-advanced]

jobs:
  test-05-advanced:
    if: true
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Build solution
        working-directory: ./src
        run: dotnet build -c Release

      - name: Check report existence
        id: check_files
        uses: andstor/file-existence-action@v3
        with:
          files: "docs/05-advanced/report.md"

      - name: Report exists
        if: steps.check_files.outputs.files_exists == 'false'
        run: |
          echo Missing report: docs/05-advanced/report.md
          exit 1
